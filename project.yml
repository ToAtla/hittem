name: HITTEM
options:
  bundleIdPrefix: is.runatlas
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  HITTEM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HITTEM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.runatlas.hittem
        PRODUCT_NAME: HITTEM
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: HITTEM
        INFOPLIST_KEY_NSContactsUsageDescription: "HITTEM shows your contacts as a deck so you can quickly decide who to call. Nothing leaves your phone."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TV8R56AQ9J
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
